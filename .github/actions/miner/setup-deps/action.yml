name: "Setup miner build dependencies"
description: "Restore and install CMake, Boost, OpenSSL, OpenCL (and optionally CUDA) from cache, plus system build tools."

inputs:
  cuda:
    description: "Also restore and install the CUDA toolkit (needed for NVIDIA/ALL builds)."
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    # ===============================
    # Download CMake
    # ===============================
    - name: Download CMake
      uses: actions/download-artifact@v4
      with:
        name: cmake-linux-3.26.4
        path: deps/cmake

    - name: Add CMake to PATH
      shell: bash
      run: |
        chmod +x ${{ github.workspace }}/deps/cmake/bin/cmake
        echo "${{ github.workspace }}/deps/cmake/bin" >> $GITHUB_PATH

    # ===============================
    # Restore and install Boost
    # ===============================
    - name: Restore Boost from cache
      uses: actions/cache/restore@v4
      with:
        path: boost-install
        key: boost-${{ runner.os }}-1.91.0

    - name: Install Boost
      shell: bash
      run: |
        sudo cp -r boost-install/include/* /usr/local/include/
        sudo cp -r boost-install/lib/* /usr/local/lib/
        sudo ldconfig

    # ===============================
    # Restore and install OpenSSL
    # ===============================
    - name: Restore OpenSSL from cache
      uses: actions/cache/restore@v4
      with:
        path: openssl-install
        key: openssl-${{ runner.os }}-1.1.1w

    - name: Install OpenSSL
      shell: bash
      run: |
        sudo cp -r openssl-install/include/* /usr/local/include/
        sudo cp -r openssl-install/lib/* /usr/local/lib/
        sudo ldconfig

    # ===============================
    # Restore and install OpenCL
    # ===============================
    - name: Restore OpenCL from cache
      uses: actions/cache/restore@v4
      with:
        path: opencl-install
        key: opencl-${{ runner.os }}-3.0.19

    - name: Install OpenCL
      shell: bash
      run: |
        sudo cp -r opencl-install/include/* /usr/local/include/
        sudo cp -r opencl-install/lib/* /usr/local/lib/
        sudo ldconfig

    # ===============================
    # Restore and install CUDA (NVIDIA/ALL only)
    # ===============================
    - name: Restore CUDA from cache
      if: ${{ inputs.cuda == 'true' }}
      uses: actions/cache/restore@v4
      with:
        path: cuda-install
        key: cuda-${{ runner.os }}-13.1.0

    - name: Install CUDA
      if: ${{ inputs.cuda == 'true' }}
      shell: bash
      run: |
        sudo mkdir -p /usr/local/cuda-13.1
        sudo cp -r cuda-install/* /usr/local/cuda-13.1/
        echo "/usr/local/cuda-13.1/bin" >> $GITHUB_PATH

    # ===============================
    # Install system build tools
    # ===============================
    - name: Install build dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libstdc++-12-dev \
          clang-15 \
          clang++-15 \
          git \
          libgnutls28-dev
