name: "Build Miner AMD"
description: "Restore deps from cache and build the AMD (OpenCL) miner backend on Linux."

runs:
  using: "composite"
  steps:
    - uses: ./.github/actions/miner/setup-deps

    # ===============================
    # Configure and build (AMD)
    # ===============================
    - name: Configure CMake (AMD)
      shell: bash
      run: |
        mkdir build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_C_COMPILER=clang-15 \
          -DCMAKE_CXX_COMPILER=clang++-15 \
          -DBUILD_EXE_BENCHMARK=OFF \
          -DBUILD_EXE_UNIT_TEST=OFF \
          -DBUILD_EXE_MINER=ON \
          -DBUILD_NVIDIA=OFF \
          -DBUILD_AMD=ON \
          -DBUILD_CPU=OFF \
          -DENABLE_LTO=OFF \
          -DENABLE_NATIVE=OFF

    - name: Build Miner (AMD)
      shell: bash
      run: make -j$(nproc) -C build

    # ===============================
    # Upload artifact
    # ===============================
    - name: Upload AMD Miner artifact
      uses: actions/upload-artifact@v4
      with:
        name: miner-amd-linux
        path: build/miner
