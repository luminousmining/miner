name: Linux Unit Tests

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-cmake:
    uses: ./.github/workflows/cmake_linux.yml

  build-boost:
    uses: ./.github/workflows/boost_linux.yml
    with:
      boost_version: "1.91.0"

  build-openssl:
    uses: ./.github/workflows/openssl_linux.yml

  unit-test:
    needs: [build-cmake, build-boost, build-openssl]
    runs-on: ubuntu-22.04

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # List of test suites to run — separate multiple suites with ":"
      # Example: "HashTest.*:AlgoTypeTest.*:EthashTest.*"
      TEST_FILTER: >-
        AlgoTypeTest.*:
        EthashTest.*:
        FastModTest.*:
        Fnv.*:
        HashTest.*:
        Kiss.*:
        MathTest.*:
        RotateByteTest.*:
        StratumProgpowSeed.*

    steps:
      - uses: actions/checkout@v4

      # ===============================
      # Download CMake
      # ===============================
      - name: Download CMake
        uses: actions/download-artifact@v4
        with:
          name: cmake-linux-3.26.4
          path: deps/cmake

      - name: Add CMake to PATH
        run: |
          chmod +x ${{ github.workspace }}/deps/cmake/bin/cmake
          echo "${{ github.workspace }}/deps/cmake/bin" >> $GITHUB_PATH

      # ===============================
      # Download and install Boost
      # ===============================
      - name: Download Boost
        uses: actions/download-artifact@v4
        with:
          name: boost-Linux-1.91.0
          path: deps/boost

      - name: Install Boost
        run: |
          sudo cp -r deps/boost/include/* /usr/local/include/
          sudo cp -r deps/boost/lib/* /usr/local/lib/
          sudo ldconfig

      # ===============================
      # Download and install OpenSSL
      # ===============================
      - name: Download OpenSSL
        uses: actions/download-artifact@v4
        with:
          name: openssl-Linux-1.1.1w
          path: deps/openssl

      - name: Install OpenSSL
        run: |
          sudo cp -r deps/openssl/include/* /usr/local/include/
          sudo cp -r deps/openssl/lib/* /usr/local/lib/
          sudo ldconfig

      # ===============================
      # Install system build tools
      # ===============================
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libstdc++-12-dev \
            clang-15 \
            clang++-15 \
            git \
            libgnutls28-dev

      # ===============================
      # Configure and build unit_test
      # ===============================
      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang-15 \
            -DCMAKE_CXX_COMPILER=clang++-15 \
            -DBUILD_EXE_MINER=OFF \
            -DBUILD_EXE_BENCHMARK=OFF \
            -DBUILD_EXE_UNIT_TEST=ON \
            -DBUILD_NVIDIA=OFF \
            -DBUILD_AMD=OFF \
            -DBUILD_CPU=OFF \
            -DTOOL_MOCKER=OFF \
            -DENABLE_LTO=OFF \
            -DENABLE_NATIVE=OFF

      - name: Build unit_test
        run: make -j$(nproc) -C build unit_test

      # ===============================
      # Run tests
      # ===============================
      - name: Run unit tests
        run: |
          FILTER=$(echo "${{ env.TEST_FILTER }}" | tr -d '\n' | tr -s ' ' | sed 's/ //g')
          echo "Running: build/bin/unit_test --gtest_filter=${FILTER}"
          build/bin/unit_test \
            --gtest_filter="${FILTER}" \
            --gtest_output="xml:test-results.xml"

      # ===============================
      # Upload test report
      # ===============================
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml
