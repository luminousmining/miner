name: Linux Miner

on:
  pull_request:
    branches:
      - main
    # Docs-only changes don't affect the build: skip the ~45-min miner matrix.
    paths-ignore:
      - '**.md'
      - 'documentation/**'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'documentation/**'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      full_build:
        description: "Full build: all 3 backends (AMD/NVIDIA/ALL) with the complete multi-arch CUDA fat binary. Off (default) = single ALL build at one CUDA arch (fast CI validation)."
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      full_build:
        description: "Full release build (3 backends, all CUDA archs)."
        required: false
        type: boolean
        default: false

# Supersede stale in-progress runs for the same PR; push-to-main and release
# (workflow_call, event_name != pull_request) runs always complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ============================================================
  # Build dependencies (reusable workflows)
  # Each dependency uses its own cache: if cache hits, it skips
  # the build but still uploads the artifact for this run.
  # ============================================================
  build-cmake:
    uses: ./.github/workflows/cmake_linux.yml

  build-boost:
    uses: ./.github/workflows/boost_linux.yml
    with:
      boost_version: "1.91.0"

  build-openssl:
    uses: ./.github/workflows/openssl_linux.yml

  build-opencl:
    uses: ./.github/workflows/opencl_linux.yml

  build-cuda:
    uses: ./.github/workflows/cuda_linux.yml

  #==========================================================================
  # Build Miner AMD
  #==========================================================================
  build-miner-amd:
    # Per-backend artifact only needed for releases; PR/push validate via build-miner-all.
    if: ${{ inputs.full_build }}
    needs: [build-cmake, build-boost, build-openssl, build-opencl]
    runs-on: ubuntu-22.04

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      # ===============================
      # Download CMake
      # ===============================
      - name: Download CMake
        uses: actions/download-artifact@v4
        with:
          name: cmake-linux-3.26.4
          path: deps/cmake

      - name: Add CMake to PATH
        run: |
          chmod +x ${{ github.workspace }}/deps/cmake/bin/cmake
          echo "${{ github.workspace }}/deps/cmake/bin" >> $GITHUB_PATH

      # ===============================
      # Restore and install Boost
      # ===============================
      - name: Restore Boost from cache
        uses: actions/cache/restore@v4
        with:
          path: boost-install
          key: boost-${{ runner.os }}-1.91.0

      - name: Install Boost
        run: |
          sudo cp -r boost-install/include/* /usr/local/include/
          sudo cp -r boost-install/lib/* /usr/local/lib/
          sudo ldconfig

      # ===============================
      # Restore and install OpenSSL
      # ===============================
      - name: Restore OpenSSL from cache
        uses: actions/cache/restore@v4
        with:
          path: openssl-install
          key: openssl-${{ runner.os }}-1.1.1w

      - name: Install OpenSSL
        run: |
          sudo cp -r openssl-install/include/* /usr/local/include/
          sudo cp -r openssl-install/lib/* /usr/local/lib/
          sudo ldconfig

      # ===============================
      # Restore and install OpenCL
      # ===============================
      - name: Restore OpenCL from cache
        uses: actions/cache/restore@v4
        with:
          path: opencl-install
          key: opencl-${{ runner.os }}-3.0.19

      - name: Install OpenCL
        run: |
          sudo cp -r opencl-install/include/* /usr/local/include/
          sudo cp -r opencl-install/lib/* /usr/local/lib/
          sudo ldconfig

      # ===============================
      # Install system build tools
      # ===============================
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libstdc++-12-dev \
            clang-15 \
            clang++-15 \
            git \
            libgnutls28-dev

      # ===============================
      # Configure and build (AMD)
      # ===============================
      - name: Configure CMake (AMD)
        run: |
          mkdir build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang-15 \
            -DCMAKE_CXX_COMPILER=clang++-15 \
            -DBUILD_EXE_BENCHMARK=OFF \
            -DBUILD_EXE_UNIT_TEST=OFF \
            -DBUILD_EXE_MINER=ON \
            -DBUILD_NVIDIA=OFF \
            -DBUILD_AMD=ON \
            -DBUILD_CPU=OFF \
            -DENABLE_LTO=OFF \
            -DENABLE_NATIVE=OFF

      - name: Build Miner (AMD)
        run: make -j$(nproc) -C build

      # ===============================
      # Upload artifact
      # ===============================
      - name: Upload AMD Miner artifact
        uses: actions/upload-artifact@v4
        with:
          name: miner-amd-linux
          path: build/miner

  #==========================================================================
  # Build Miner NVIDIA
  #==========================================================================
  build-miner-nvidia:
    # Per-backend artifact only needed for releases; PR/push validate via build-miner-all.
    if: ${{ inputs.full_build }}
    needs: [build-cmake, build-boost, build-openssl, build-opencl, build-cuda]
    runs-on: ubuntu-22.04

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      # ===============================
      # Download CMake
      # ===============================
      - name: Download CMake
        uses: actions/download-artifact@v4
        with:
          name: cmake-linux-3.26.4
          path: deps/cmake

      - name: Add CMake to PATH
        run: |
          chmod +x ${{ github.workspace }}/deps/cmake/bin/cmake
          echo "${{ github.workspace }}/deps/cmake/bin" >> $GITHUB_PATH

      # ===============================
      # Restore and install Boost
      # ===============================
      - name: Restore Boost from cache
        uses: actions/cache/restore@v4
        with:
          path: boost-install
          key: boost-${{ runner.os }}-1.91.0

      - name: Install Boost
        run: |
          sudo cp -r boost-install/include/* /usr/local/include/
          sudo cp -r boost-install/lib/* /usr/local/lib/
          sudo ldconfig

      # ===============================
      # Restore and install OpenSSL
      # ===============================
      - name: Restore OpenSSL from cache
        uses: actions/cache/restore@v4
        with:
          path: openssl-install
          key: openssl-${{ runner.os }}-1.1.1w

      - name: Install OpenSSL
        run: |
          sudo cp -r openssl-install/include/* /usr/local/include/
          sudo cp -r openssl-install/lib/* /usr/local/lib/
          sudo ldconfig

      # ===============================
      # Restore and install OpenCL
      # ===============================
      - name: Restore OpenCL from cache
        uses: actions/cache/restore@v4
        with:
          path: opencl-install
          key: opencl-${{ runner.os }}-3.0.19

      - name: Install OpenCL
        run: |
          sudo cp -r opencl-install/include/* /usr/local/include/
          sudo cp -r opencl-install/lib/* /usr/local/lib/
          sudo ldconfig

      # ===============================
      # Restore and install CUDA
      # ===============================
      - name: Restore CUDA from cache
        uses: actions/cache/restore@v4
        with:
          path: cuda-install
          key: cuda-${{ runner.os }}-13.1.0

      - name: Install CUDA
        run: |
          sudo mkdir -p /usr/local/cuda-13.1
          sudo cp -r cuda-install/* /usr/local/cuda-13.1/
          echo "/usr/local/cuda-13.1/bin" >> $GITHUB_PATH

      # ===============================
      # Install system build tools
      # ===============================
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libstdc++-12-dev \
            clang-15 \
            clang++-15 \
            git \
            libgnutls28-dev

      # ===============================
      # Configure and build (NVIDIA)
      # ===============================
      - name: Configure CMake (NVIDIA)
        run: |
          mkdir build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang-15 \
            -DCMAKE_CXX_COMPILER=clang++-15 \
            -DBUILD_EXE_BENCHMARK=OFF \
            -DBUILD_EXE_UNIT_TEST=OFF \
            -DBUILD_EXE_MINER=ON \
            -DBUILD_NVIDIA=ON \
            -DBUILD_AMD=OFF \
            -DBUILD_CPU=OFF \
            -DENABLE_LTO=OFF \
            -DENABLE_NATIVE=OFF
        env:
          CUDA_HOME: /usr/local/cuda-13.1
          CUDACXX: /usr/local/cuda-13.1/bin/nvcc
          LD_LIBRARY_PATH: /usr/local/cuda-13.1/lib64:/usr/local/lib

      - name: Build Miner (NVIDIA)
        run: make -j$(nproc) -C build
        env:
          CUDA_HOME: /usr/local/cuda-13.1
          CUDACXX: /usr/local/cuda-13.1/bin/nvcc
          LD_LIBRARY_PATH: /usr/local/cuda-13.1/lib64:/usr/local/lib

      # ===============================
      # Upload artifact
      # ===============================
      - name: Upload NVIDIA Miner artifact
        uses: actions/upload-artifact@v4
        with:
          name: miner-nvidia-linux
          path: build/miner

  #==========================================================================
  # Build Miner ALL (AMD + NVIDIA + CPU)
  #==========================================================================
  build-miner-all:
    needs: [build-cmake, build-boost, build-openssl, build-opencl, build-cuda]
    runs-on: ubuntu-22.04

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Empty on PR/push -> single CUDA arch (fast); "true" on release -> full fat binary.
      FULL_BUILD: ${{ inputs.full_build }}

    steps:
      - uses: actions/checkout@v4

      # ===============================
      # Download CMake
      # ===============================
      - name: Download CMake
        uses: actions/download-artifact@v4
        with:
          name: cmake-linux-3.26.4
          path: deps/cmake

      - name: Add CMake to PATH
        run: |
          chmod +x ${{ github.workspace }}/deps/cmake/bin/cmake
          echo "${{ github.workspace }}/deps/cmake/bin" >> $GITHUB_PATH

      # ===============================
      # Restore and install Boost
      # ===============================
      - name: Restore Boost from cache
        uses: actions/cache/restore@v4
        with:
          path: boost-install
          key: boost-${{ runner.os }}-1.91.0

      - name: Install Boost
        run: |
          sudo cp -r boost-install/include/* /usr/local/include/
          sudo cp -r boost-install/lib/* /usr/local/lib/
          sudo ldconfig

      # ===============================
      # Restore and install OpenSSL
      # ===============================
      - name: Restore OpenSSL from cache
        uses: actions/cache/restore@v4
        with:
          path: openssl-install
          key: openssl-${{ runner.os }}-1.1.1w

      - name: Install OpenSSL
        run: |
          sudo cp -r openssl-install/include/* /usr/local/include/
          sudo cp -r openssl-install/lib/* /usr/local/lib/
          sudo ldconfig

      # ===============================
      # Restore and install OpenCL
      # ===============================
      - name: Restore OpenCL from cache
        uses: actions/cache/restore@v4
        with:
          path: opencl-install
          key: opencl-${{ runner.os }}-3.0.19

      - name: Install OpenCL
        run: |
          sudo cp -r opencl-install/include/* /usr/local/include/
          sudo cp -r opencl-install/lib/* /usr/local/lib/
          sudo ldconfig

      # ===============================
      # Restore and install CUDA
      # ===============================
      - name: Restore CUDA from cache
        uses: actions/cache/restore@v4
        with:
          path: cuda-install
          key: cuda-${{ runner.os }}-13.1.0

      - name: Install CUDA
        run: |
          sudo mkdir -p /usr/local/cuda-13.1
          sudo cp -r cuda-install/* /usr/local/cuda-13.1/
          echo "/usr/local/cuda-13.1/bin" >> $GITHUB_PATH

      # ===============================
      # Install system build tools
      # ===============================
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libstdc++-12-dev \
            clang-15 \
            clang++-15 \
            git \
            libgnutls28-dev

      # ===============================
      # Configure and build (ALL)
      # ===============================
      - name: Configure CMake (ALL)
        run: |
          # Runners have no GPU: a single CUDA arch is enough to validate that the
          # code compiles. Release builds (full_build) omit this for the full fat binary.
          ARCH_FLAG=""
          if [ "$FULL_BUILD" != "true" ]; then ARCH_FLAG="-DNVCC_ARCH_COMPUTE=89"; fi
          mkdir build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            $ARCH_FLAG \
            -DCMAKE_C_COMPILER=clang-15 \
            -DCMAKE_CXX_COMPILER=clang++-15 \
            -DBUILD_EXE_BENCHMARK=OFF \
            -DBUILD_EXE_UNIT_TEST=OFF \
            -DBUILD_EXE_MINER=ON \
            -DBUILD_NVIDIA=ON \
            -DBUILD_AMD=ON \
            -DBUILD_CPU=ON \
            -DENABLE_LTO=OFF \
            -DENABLE_NATIVE=OFF
        env:
          CUDA_HOME: /usr/local/cuda-13.1
          CUDACXX: /usr/local/cuda-13.1/bin/nvcc
          LD_LIBRARY_PATH: /usr/local/cuda-13.1/lib64:/usr/local/lib

      - name: Build Miner (ALL)
        run: make -j$(nproc) -C build
        env:
          CUDA_HOME: /usr/local/cuda-13.1
          CUDACXX: /usr/local/cuda-13.1/bin/nvcc
          LD_LIBRARY_PATH: /usr/local/cuda-13.1/lib64:/usr/local/lib

      # ===============================
      # Upload artifact
      # ===============================
      - name: Upload ALL Miner artifact
        uses: actions/upload-artifact@v4
        with:
          name: miner-all-linux
          path: build/miner
