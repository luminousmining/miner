name: miner-regression-x64

# Non-regression guard for the x86-64 default of docker/Dockerfile.linux. The
# linux-arm64 work parameterized that Dockerfile (TARGETARCH, GPU=cpu, runtime
# stage) with amd64 as the unchanged default; this builds the amd64 CPU path so a
# change that breaks it is caught. CPU-only (fast): no CUDA/OpenCL. The GPU=both
# path is exercised by the existing miner_linux.yml.

on:
  workflow_dispatch:

jobs:
  linux-x64-cpu:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build linux x64 (CPU-only, default TARGETARCH) runtime image
        run: |
          docker buildx build --platform linux/amd64 \
            -f docker/Dockerfile.linux --build-arg GPU=cpu \
            --target runtime -t lm:linux-x64-cpu --load .
      - name: Smoke-run miner --help
        run: |
          out="$(docker run --rm lm:linux-x64-cpu --help 2>&1 || true)"
          echo "$out" | head -3
          echo "$out" | grep -q "LuminousMiner"
