name: miner-linux-x64-vcpkg

# Validates the x86-64 path of the vcpkg Docker image docker/Dockerfile.linux
# (issue #169). amd64 is the Dockerfile's default TARGETARCH; this builds the
# CPU-only path so a change that breaks it is caught, and doubles as the x64
# counterpart to miner-linux-arm64-vcpkg. Build-only: no artifact is pushed; the
# image is loaded locally and smoke-run. CPU-only (fast): no CUDA/OpenCL. The
# GPU=both artifact build is exercised by the non-vcpkg miner_linux.yml.

on:
  workflow_dispatch:

jobs:
  linux-x64-cpu:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build linux x64 (CPU-only, default TARGETARCH) runtime image
        run: |
          docker buildx build --platform linux/amd64 \
            -f docker/Dockerfile.linux --build-arg GPU=cpu \
            --target runtime -t lm:linux-x64-cpu --load .
      - name: Smoke-run miner --help
        run: |
          out="$(docker run --rm lm:linux-x64-cpu --help 2>&1 || true)"
          echo "$out" | head -3
          echo "$out" | grep -q "LuminousMiner"
